[theme]
# Dark, high-contrast theme — matches the transparent Plotly backgrounds and
# fixes the previous dark-on-dark metric cards. Palette from the validated
# data-viz reference (dark surface #1a1a19, page plane #0d0d0d).
base = "dark"
primaryColor = "#3987e5"
backgroundColor = "#0d0d0d"
secondaryBackgroundColor = "#1a1a19"
textColor = "#ffffff"
font = "sans serif"

[server]
headless = true
